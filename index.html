<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "457ffc6e0962458b8c8bbee62ee7f0d1",
      application: "lab9-cse110"
    });
  </script>
  
  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
<form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" aria-label="First Number" />
        <select name="operator" id="operator" aria-label="Operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" aria-label="Second Number" />
        
        <button id="calculate" type="submit">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button type="button">Console Log</button>
      <button type="button">Console Error</button>
      <button type="button">Console Count</button>
      <button type="button">Console Warn</button>
      <button type="button">Console Assert</button>
      <button type="button">Console Clear</button>
      <button type="button">Console Dir</button>
      <button type="button">Console dirxml</button>
      <button type="button">Console Group Start</button>
      <button type="button">Console Group End</button>
      <button type="button">Console Table</button>
      <button type="button">Start Timer</button>
      <button type="button">End Timer</button>
      <button type="button">Console Trace</button>
      <button type="button">Trigger a Global Error</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
